name: Refresh content from Google Doc

# Runs daily at 04:00 UTC. Fetches the source Google Doc, regenerates
# content/content.json, and commits + pushes if anything changed.
# A push to main triggers Vercel's auto-deploy, so updates go live ~1 min later.
#
# Also runnable on demand from the Actions tab via "Run workflow".
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-content
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN; commits will be authored by github-actions[bot].
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate content.json
        run: npm run content:build

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- content/content.json; then
            echo "No content changes; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/content.json
          git commit -m "chore(content): refresh from Google Doc"
          git push origin HEAD:main
